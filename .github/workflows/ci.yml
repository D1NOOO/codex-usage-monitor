name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build
        shell: pwsh
        run: |
          ./scripts/verify.ps1
          ./scripts/build.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: CodexRateMonitor-windows
          path: artifacts/CodexRateMonitor/
          if-no-files-found: error
          retention-days: 7
