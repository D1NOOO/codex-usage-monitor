name: Bug report
description: Report a reproducible problem without including private data.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach `auth.json`, tokens, account identifiers, or screenshots containing private information.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v2.2.0
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: UI language
      options:
        - Simplified Chinese
        - Traditional Chinese
        - English
        - Auto
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
